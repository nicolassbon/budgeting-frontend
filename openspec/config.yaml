schema: spec-driven
strict_tdd: true

context: |
  Tech stack: Next.js 15 App Router, React 18, TypeScript 5.7, pnpm.
  UI: shadcn/ui + Tailwind CSS foundation.
  Architecture: single-route client shell with mocked auth and in-memory React Context store.
  Testing: Vitest 4 + JSDOM, React Testing Library, ESLint 9 flat config, Prettier 3, Next build, and TypeScript via tsc --noEmit once .next types exist.
  Conventions: Tailwind utilities + shared ui primitives; es-AR UI copy.

testing:
  detected: 2026-07-01
  strict_tdd: true
  runner:
    command: pnpm test
    framework: Vitest
    environment: jsdom
    watch_command: pnpm test:watch
  layers:
    unit:
      available: true
      tool: Vitest
    integration:
      available: true
      tool: React Testing Library + Vitest
    e2e:
      available: false
      tool: ''
  coverage:
    available: false
    command: ''
  notes:
    - Test files currently live in *.test.ts and *.test.tsx across app, components, and lib.
    - pnpm exec tsc --noEmit requires generated .next/types; run pnpm build or pnpm dev first when those files are missing.
    - pnpm format:check also scans openspec markdown, so stale spec docs can fail verification before app code checks run.
  quality:
    linter:
      available: true
      command: pnpm lint
    type_checker:
      available: true
      command: pnpm exec tsc --noEmit
      precondition: Ensure .next/types exists by running pnpm build or pnpm dev if type generation has not happened yet.
    formatter:
      available: true
      command: pnpm format:check
    build:
      available: true
      command: pnpm build

rules:
  proposal:
    - Keep proposals scoped to one user-visible change.
    - State rollback expectations when touching capture or expense flows.
  specs:
    - Use RFC 2119 keywords (MUST, SHOULD, MAY).
    - Write scenarios in Given/When/Then form.
  design:
    - Respect the single-page shell and current mock auth/store boundaries.
    - Preserve the shadcn/Tailwind foundation and shared design tokens.
  tasks:
    - Group tasks by phase and keep each task reviewable in one session.
  apply:
    tdd: true
    test_command: pnpm test
    rules:
      - Follow existing Next.js App Router and strict TypeScript patterns.
  verify:
    test_command: pnpm test
    build_command: pnpm build
    typecheck_command: pnpm exec tsc --noEmit
    lint_command: pnpm lint
    format_check_command: pnpm format:check
    coverage_threshold: 0
  archive:
    - Merge only finalized deltas into main specs.
    - Preserve archived changes as immutable audit trail.
